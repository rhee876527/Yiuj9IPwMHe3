name: Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily, adjust the schedule as needed
  workflow_dispatch:

jobs:
  sync-fork:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Git
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git remote add upstream https://github.com/folbricht/routedns.git  

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Check for changes
      id: check_changes
      run: echo ::set-output name=changes::$(git diff --name-only master...upstream/master | wc -l)

    - name: Merge changes
      if: steps.check_changes.outputs.changes > 0
      run: |
        git merge --no-commit --no-ff upstream/master
        # Ensure these files are not in the local repository after the merge
        for file in build.yaml codeql-analysis.yml version_bump.yaml; do
          if [ -e "$file" ]; then
            git reset HEAD "$file"  # Unstage the file if it exists
            git checkout -- "$file"  # Restore the file to its local state
          else
            git rm --cached "$file"  # Remove the file from the staging area if it doesn't exist locally
          fi
        done
        git add -u 

    - name: Commit changes
      if: steps.check_changes.outputs.changes > 0
      run: git commit -m "Sync upstream changes"

    - name: Push changes to fork
      if: steps.check_changes.outputs.changes > 0
      run: git push origin master
