name: Sync

on:
  schedule:
    - cron: '0 21 * * 2,0' # Tue & Sun 9PM UTC
  workflow_dispatch:

jobs:
  sync-fork:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Git
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git remote add upstream https://github.com/folbricht/routedns.git  

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Check if merge is necessary
      id: check_merge
      run: |
        echo "Checking for new commits from upstream..."
        UPSTREAM_REPO="folbricht/routedns"
        FORK_REPO="${{ github.repository }}"
        UPSTREAM_BRANCH="master"
        FORK_BRANCH="master"

        # Compare the commits to check if there are any new commits in the upstream repository
        COMPARE_URL="https://api.github.com/repos/$UPSTREAM_REPO/compare/$FORK_REPO:$FORK_BRANCH...$UPSTREAM_REPO:$UPSTREAM_BRANCH"
        COMPARE_RESULT=$(curl -s $COMPARE_URL)

        # Check if the API call was successful
        if echo "$COMPARE_RESULT" | jq -e . > /dev/null 2>&1; then
          AHEAD_BY=$(echo "$COMPARE_RESULT" | jq -r '.ahead_by')
          echo "AHEAD_BY=$AHEAD_BY"
          
          if [ "$AHEAD_BY" -gt 0 ]; then
            echo "Changes detected, merge needed."
            echo "::set-output name=merge_needed::true"
          else
            echo "No changes to sync."
            echo "::set-output name=merge_needed::false"
          fi
        else
          echo "Failed to fetch comparison data from GitHub API."
          echo "::set-output name=merge_needed::false"
        fi
      shell: sh

    - name: Merge changes
      if: steps.check_merge.outputs.merge_needed == 'true'
      run: |
        git merge --no-commit --no-ff -Xtheirs --allow-unrelated-histories upstream/master || true
        # Exclude YAML files from .github/workflows/ directory from being synchronized
        git reset HEAD .github/workflows/*.yaml .github/workflows/*.yml || true
        git checkout -- .github/workflows/*.yaml .github/workflows/*.yml || true
        git add -u

    - name: Check for changes
      if: steps.check_merge.outputs.merge_needed == 'true'
      id: changes
      run: |
        if [ -z "$(git status --porcelain)" ]; then
          echo "::set-output name=changes::false"
        else
          echo "::set-output name=changes::true"
        fi

    - name: Commit changes
      if: steps.changes.outputs.changes == 'true'
      run: git commit -m "Sync upstream changes"

    - name: Push changes
      if: steps.changes.outputs.changes == 'true'
      run: git push origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
