name: Sync

on:
  schedule:
    - cron: '0 21 * * 2,0' #Tue & Sun 9PM UTC
  workflow_dispatch:

jobs:
  sync-fork:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Git
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git remote add upstream https://github.com/folbricht/routedns.git  

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Merge changes
      run: |
        git merge --no-commit --no-ff --allow-unrelated-histories upstream/master || true
        # Exclude YAML files from .github/workflows/ directory from being synchronized
        git reset HEAD .github/workflows/*.yaml || true
        git checkout -- .github/workflows/*.yaml || true
        git add -u 

    - name: Commit changes
      run: |
        git commit -m "Sync upstream changes" || echo "No changes to commit"
